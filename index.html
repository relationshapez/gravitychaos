<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Relationshapez: Gravity Chaos</title>
<style>
:root{
  --gw-blue:#033C5A;
  --gw-buff:#D6BF91;
  --gw-light:#7FBAE3;
  --bg:#F7F5F0;
  --panel:#FFFFFF;
  --line:#D7DDE4;
  --text:#1F2937;
  --muted:#6B7280;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
body{padding:10px}
.app{max-width:760px;margin:0 auto;display:grid;gap:10px}
.panel{background:var(--panel);border-radius:18px;padding:12px;box-shadow:0 4px 18px rgba(0,0,0,.08)}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.tab-strip,.mode-pill{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:#fff}
.tab-btn,.mode-btn{border:0;background:transparent;color:var(--gw-blue);padding:10px 14px;font-weight:800;cursor:pointer}
.tab-btn.active,.mode-btn.active{background:var(--gw-blue);color:#fff}
.main-controls{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
select,input[type="number"]{width:100%;min-width:0;padding:10px 12px;border:1px solid var(--line);border-radius:12px;font:inherit;background:#fff;color:var(--text)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.btn{border:0;background:var(--gw-blue);color:#fff;padding:10px 14px;border-radius:12px;font-weight:800;cursor:pointer}
.btn.secondary{background:var(--gw-buff);color:var(--gw-blue)}
.hidden{display:none!important}
.canvas-wrap{position:relative;touch-action:none;border:1px solid var(--line);border-radius:18px;overflow:hidden;touch-action:none;background:radial-gradient(circle at 20% 20%, rgba(214,191,145,.22), transparent 34%), linear-gradient(180deg, #ffffff 0%, #fbfaf6 100%)}
.zoom-controls{position:absolute;right:10px;bottom:10px;display:flex;flex-direction:column;gap:8px;z-index:20;pointer-events:auto;touch-action:manipulation}
.zoom-btn{width:40px;height:40px;border:0;border-radius:12px;background:rgba(255,255,255,0.92);color:var(--gw-blue);font-size:1.4rem;font-weight:800;box-shadow:0 2px 10px rgba(0,0,0,.12);cursor:pointer;pointer-events:auto;touch-action:manipulation}
.zoom-btn:active{transform:scale(.98)}
canvas{display:block;width:100%;height:min(62vh,540px);touch-action:none}
.body-grid{display:grid;grid-template-columns:1fr;gap:10px}
.body-card{border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff}
.body-card h3{margin:0 0 8px 0;font-size:1rem;display:flex;align-items:center;gap:8px;color:var(--gw-blue)}
.dot{width:12px;height:12px;border-radius:50%}
.field-grid{display:grid;grid-template-columns:auto minmax(0,1fr);gap:8px 10px;align-items:center}
label{font-weight:700;color:var(--gw-blue)}
.section-title{margin:0 0 10px 0;color:var(--gw-blue);font-weight:800}
.subsection{margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
input[readonly],input:disabled,select:disabled{opacity:.75}
@media (min-width:700px){.body-grid{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="panel">
    <div class="topbar">
      <div class="tab-strip">
        <button id="mainTabBtn" class="tab-btn active" type="button">View</button>
        <button id="bodiesTabBtn" class="tab-btn" type="button">Bodies</button>
      </div>
      <div class="mode-pill">
        <button id="exactModeBtn" class="mode-btn active" type="button">Exact</button>
        <button id="simModeBtn" class="mode-btn" type="button">Simulated</button>
      </div>
    </div>
  </div>

  <div id="mainPanel" class="panel">
    <div class="main-controls">
      <select id="presetSelect"></select>
      <div class="btn-row">
        <button id="playPauseBtn" class="btn" type="button">Pause</button>
        <button id="resetBtn" class="btn secondary" type="button">Reset</button>
      </div>
    </div>
  </div>

  <div id="canvasPanel" class="panel">
    <div id="canvasWrap" class="canvas-wrap"><canvas id="simCanvas"></canvas><div class="zoom-controls"><button id="zoomInBtn" class="zoom-btn" type="button" aria-label="Zoom in">+</button><button id="zoomOutBtn" class="zoom-btn" type="button" aria-label="Zoom out">−</button></div></div>
  </div>

  <div id="bodiesPanel" class="panel hidden">
    <div class="body-grid">
      <div class="body-card">
        <h3><span class="dot" style="background:#D6BF91"></span>Body A</h3>
        <div class="field-grid">
          <label for="m1">m</label><input id="m1" type="number" step="0.1" min="0.1" value="1">
          <label for="x1">x</label><input id="x1" type="number" step="0.0001" value="0">
          <label for="y1">y</label><input id="y1" type="number" step="0.0001" value="0">
          <label for="vx1">vx</label><input id="vx1" type="number" step="0.0001" value="0">
          <label for="vy1">vy</label><input id="vy1" type="number" step="0.0001" value="0">
        </div>
      </div>
      <div class="body-card">
        <h3><span class="dot" style="background:#033C5A"></span>Body B</h3>
        <div class="field-grid">
          <label for="m2">m</label><input id="m2" type="number" step="0.1" min="0.1" value="1">
          <label for="x2">x</label><input id="x2" type="number" step="0.0001" value="0">
          <label for="y2">y</label><input id="y2" type="number" step="0.0001" value="0">
          <label for="vx2">vx</label><input id="vx2" type="number" step="0.0001" value="0">
          <label for="vy2">vy</label><input id="vy2" type="number" step="0.0001" value="0">
        </div>
      </div>
      <div class="body-card">
        <h3><span class="dot" style="background:#7FBAE3"></span>Body C</h3>
        <div class="field-grid">
          <label for="m3">m</label><input id="m3" type="number" step="0.1" min="0.1" value="1">
          <label for="x3">x</label><input id="x3" type="number" step="0.0001" value="0">
          <label for="y3">y</label><input id="y3" type="number" step="0.0001" value="0">
          <label for="vx3">vx</label><input id="vx3" type="number" step="0.0001" value="0">
          <label for="vy3">vy</label><input id="vy3" type="number" step="0.0001" value="0">
        </div>
      </div>
    </div>
    <div class="subsection">
      <div class="field-grid">
        <label for="dtInput">Step Size</label><input id="dtInput" type="number" step="any" min="1e-12" value="0.008">
      </div>
    </div>
  </div>
</div>

function lagrangePreset(label,masses,side=2.1){
  const [m1,m2,m3]=masses;
  const raw=[{x:-side/2,y:-Math.sqrt(3)*side/6},{x:side/2,y:-Math.sqrt(3)*side/6},{x:0,y:Math.sqrt(3)*side/3}];

}

function flatSampleToBodies(sample){
  return [
    {m:1,x:sample[0],y:sample[1],vx:sample[2],vy:sample[3]},
    {m:1,x:sample[4],y:sample[5],vx:sample[6],vy:sample[7]},

function interpolateFlat(a,b,u){ return a.map((v,i)=> v + (b[i]-v)*u); }
function replayPreset(label, v1, v2, T){
  const id = label.toLowerCase().replace(/[^a-z0-9]+/g,'-');
  const samples = REPLAY_REFS[label];
  const initialBodies = [
    {m:1,x:-1,y:0,vx:v1,vy:v2},
    {m:1,x:1,y:0,vx:v1,vy:v2},
    {m:1,x:0,y:0,vx:-2*v1,vy:-2*v2}
  ];
  return {id,label,kind:'replay',period:T,initialBodies,exactAt(t){
    const Tloc = T;
    let tau = ((t % Tloc) + Tloc) % Tloc;
    const n = samples.length - 1;
    const scaled = (tau / Tloc) * n;
    const i = Math.floor(scaled);
    const j = Math.min(n, i + 1);
    const u = scaled - i;
    return flatSampleToBodies(interpolateFlat(samples[i], samples[j], u));
  }};
}

function writeFields(bodies){bodies.forEach((b,i)=>{bodyFields[i].m.value=fmt(b.m,6); bodyFields[i].x.value=fmt(b.x,10); bodyFields[i].y.value=fmt(b.y,10); bodyFields[i].vx.value=fmt(b.vx,10); bodyFields[i].vy.value=fmt(b.vy,10);});}
function centerOfMass(bodies){let mx=0,my=0,m=0; bodies.forEach(b=>{mx+=b.m*b.x; my+=b.m*b.y; m+=b.m;}); return {x:mx/m,y:my/m};}
function computeExtent(bodies){let maxR=1.5; bodies.forEach(b=>{maxR=Math.max(maxR,Math.hypot(b.x,b.y)); const trail=b.trail||[]; const skip=Math.max(1,Math.floor(trail.length/200)); for(let i=0;i<trail.length;i+=skip) maxR=Math.max(maxR,Math.hypot(trail[i].x,trail[i].y));}); return Math.max(1.8,1.25*maxR);}
function centerViewFromBodies(bodies){const c=centerOfMass(bodies); state.view.panX=c.x; state.view.panY=c.y; state.view.baseExtent=computeExtent(bodies);}
function resetTrails(arr){arr.forEach(b=>{b.trail=[{x:b.x,y:b.y}]});}
function pushTrail(body){if(!Array.isArray(body.trail)) body.trail=[]; body.trail.push({x:body.x,y:body.y});}
function totalEnergy(bodies,eps){let K=0,U=0; for(const b of bodies) K+=0.5*b.m*(b.vx*b.vx+b.vy*b.vy); for(let i=0;i<bodies.length;i++) for(let j=i+1;j<bodies.length;j++){const dx=bodies[j].x-bodies[i].x,dy=bodies[j].y-bodies[i].y; const r=Math.sqrt(dx*dx+dy*dy+eps*eps); U-=G*bodies[i].m*bodies[j].m/r;} return K+U;}
function angularMomentum(bodies){let L=0; for(const b of bodies) L+=b.m*(b.x*b.vy-b.y*b.vx); return L;}
function accelerations(bodies,eps){const acc=bodies.map(()=>({ax:0,ay:0})); for(let i=0;i<bodies.length;i++){for(let j=i+1;j<bodies.length;j++){const dx=bodies[j].x-bodies[i].x,dy=bodies[j].y-bodies[i].y; const r2=dx*dx+dy*dy+eps*eps; const inv=1/(r2*Math.sqrt(r2)); const fx=G*dx*inv, fy=G*dy*inv; acc[i].ax+=bodies[j].m*fx; acc[i].ay+=bodies[j].m*fy; acc[j].ax-=bodies[i].m*fx; acc[j].ay-=bodies[i].m*fy;}} return acc;}
function closestGap(bodies){let d=Infinity; for(let i=0;i<bodies.length;i++) for(let j=i+1;j<bodies.length;j++) d=Math.min(d,Math.hypot(bodies[j].x-bodies[i].x,bodies[j].y-bodies[i].y)); return d;}
function maxSpeed(bodies){let v=0; for(const b of bodies) v=Math.max(v,Math.hypot(b.vx,b.vy)); return v;}
function clonePlainBodies(bodies){return bodies.map(b=>({m:b.m,x:b.x,y:b.y,vx:b.vx,vy:b.vy}));}
function addScaledBodies(base, delta, scale){return base.map((b,i)=>({m:b.m,x:b.x+delta[i].x*scale,y:b.y+delta[i].y*scale,vx:b.vx+delta[i].vx*scale,vy:b.vy+delta[i].vy*scale}));}
function derivatives(bodies, eps){const acc=accelerations(bodies,eps); return bodies.map((b,i)=>({x:b.vx,y:b.vy,vx:acc[i].ax,vy:acc[i].ay}));}
function rk4Step(bodies, dt, eps){const k1=derivatives(bodies,eps); const k2=derivatives(addScaledBodies(bodies,k1,0.5*dt),eps); const k3=derivatives(addScaledBodies(bodies,k2,0.5*dt),eps); const k4=derivatives(addScaledBodies(bodies,k3,dt),eps); return bodies.map((b,i)=>({m:b.m,x:b.x+(dt/6)*(k1[i].x+2*k2[i].x+2*k3[i].x+k4[i].x),y:b.y+(dt/6)*(k1[i].y+2*k2[i].y+2*k3[i].y+k4[i].y),vx:b.vx+(dt/6)*(k1[i].vx+2*k2[i].vx+2*k3[i].vx+k4[i].vx),vy:b.vy+(dt/6)*(k1[i].vy+2*k2[i].vy+2*k3[i].vy+k4[i].vy),color:b.color,trail:b.trail||[]}));}
function chooseAdaptiveStep(bodies, baseDt){const d=Math.max(closestGap(bodies),1e-9); const v=Math.max(maxSpeed(bodies),1e-9); const totalMass=bodies.reduce((s,b)=>s+b.m,0); const gravScale=0.03*Math.sqrt((d*d*d)/Math.max(totalMass,1e-9)); const travelScale=0.08*d/v; return Math.max(1e-12, Math.min(baseDt, gravScale, travelScale));}
function resetToPreset(preset){state.customBodies=false; updatePresetSelectLock(); state.preset=preset; if(ui.presetSelect.value!==preset.id) ui.presetSelect.value=preset.id; writeFields(preset.initialBodies); state.time=0; state.runUntil=null; if(state.mode==='exact'){state.exactBodies=cloneBodies(preset.exactAt(0)); resetTrails(state.exactBodies); centerViewFromBodies(state.exactBodies);} else {state.simBodies=cloneBodies(preset.initialBodies); state.simInitialBodies=cloneBodies(preset.initialBodies); resetTrails(state.simBodies); centerViewFromBodies(state.simBodies);} state.running=false; ui.playPauseBtn.textContent='Play'; draw();}
function applyManualFields(){const b=readFields(); state.simBodies=cloneBodies(b); state.simInitialBodies=cloneBodies(b); state.time=0; state.runUntil=null; resetTrails(state.simBodies); centerViewFromBodies(state.simBodies); state.running=false; ui.playPauseBtn.textContent='Play'; state.mode='simulated'; state.customBodies=true; updateModeVisuals(); draw();}
function setMode(mode){if(mode===state.mode && !(mode==='exact' && state.customBodies)) return; state.mode=mode; state.time=0; state.runUntil=null; state.running=false; ui.playPauseBtn.textContent='Play'; if(mode==='exact'){ state.customBodies=false; writeFields(state.preset.initialBodies); state.exactBodies=cloneBodies(state.preset.exactAt(0)); resetTrails(state.exactBodies); centerViewFromBodies(state.exactBodies);} else { if(!state.customBodies) writeFields(state.preset.initialBodies); state.simBodies=cloneBodies(readFields()); state.simInitialBodies=cloneBodies(state.simBodies); resetTrails(state.simBodies); centerViewFromBodies(state.simBodies);} updateModeVisuals(); draw();}
function stepWorld(){if(!state.running) return; const speed=Math.max(0.05,Math.min(20,Number(document.getElementById('speedHidden')?.value||1))); const frameDt=(1/60)*speed; if(state.mode==='exact'){state.time += frameDt; if(state.runUntil!==null && state.time>=state.runUntil){state.time=state.runUntil; state.running=false; ui.playPauseBtn.textContent='Play';} const src=state.preset.exactAt(state.time); for(let i=0;i<src.length;i++){const trail=Array.isArray(state.exactBodies[i].trail)?state.exactBodies[i].trail:[]; state.exactBodies[i]={...state.exactBodies[i],...src[i],color:BODY_COLORS[i],trail}; pushTrail(state.exactBodies[i]);} return;} const rawDt=Number(ui.dtInput.value); const baseDt=(Number.isFinite(rawDt) && rawDt>0) ? rawDt : 0.008; const eps=0; let remaining=frameDt; let steps=0; const MAX_STEPS_PER_FRAME=4000; while(remaining>1e-12 && steps<MAX_STEPS_PER_FRAME){const h=Math.min(remaining, chooseAdaptiveStep(state.simBodies, baseDt)); state.simBodies=rk4Step(state.simBodies,h,eps); remaining-=h; state.time += h; steps++; if(state.runUntil!==null && state.time>=state.runUntil){state.running=false; ui.playPauseBtn.textContent='Play'; break;}} state.simBodies.forEach(pushTrail);}
function worldToScreen(p){const w=canvas.width,h=canvas.height; const extent=state.view.baseExtent/state.view.zoom; return {x:w*0.5+(p.x-state.view.panX)*(Math.min(w,h)*0.5/extent), y:h*0.5-(p.y-state.view.panY)*(Math.min(w,h)*0.5/extent)};}
function screenToWorld(x,y){const w=canvas.width,h=canvas.height; const extent=state.view.baseExtent/state.view.zoom; const scale=Math.min(w,h)*0.5/extent; if(!Number.isFinite(scale)||scale===0){return {x:state.view.panX,y:state.view.panY};} return {x:state.view.panX+(x-w*0.5)/scale,y:state.view.panY-(y-h*0.5)/scale};}
function drawGrid(){const w=canvas.width,h=canvas.height; ctx.clearRect(0,0,w,h); const extent=state.view.baseExtent/state.view.zoom; const step=extent>4?1:extent>2?0.5:0.25; ctx.lineWidth=1; ctx.strokeStyle='rgba(3,60,90,0.10)'; for(let x=Math.floor((state.view.panX-extent)/step)*step; x<=state.view.panX+extent; x+=step){const p0=worldToScreen({x,y:state.view.panY-extent}); const p1=worldToScreen({x,y:state.view.panY+extent}); ctx.beginPath(); ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y); ctx.stroke();} for(let y=Math.floor((state.view.panY-extent)/step)*step; y<=state.view.panY+extent; y+=step){const p0=worldToScreen({x:state.view.panX-extent,y}); const p1=worldToScreen({x:state.view.panX+extent,y}); ctx.beginPath(); ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y); ctx.stroke();}}
function draw(){const rect=canvas.getBoundingClientRect(); const dpr=Math.max(1,window.devicePixelRatio||1); const width=Math.max(320,Math.round(rect.width*dpr)); const height=Math.max(240,Math.round(rect.height*dpr)); if(canvas.width!==width||canvas.height!==height){canvas.width=width;canvas.height=height;} drawGrid(); const bodies=currentBodies(); bodies.forEach((b,i)=>{if(!b.trail||b.trail.length<2) return; ctx.strokeStyle=TRAIL_COLORS[i]+'DD'; ctx.lineWidth=Math.max(1.5,canvas.width/850); ctx.beginPath(); b.trail.forEach((p,k)=>{const s=worldToScreen(p); if(k===0) ctx.moveTo(s.x,s.y); else ctx.lineTo(s.x,s.y);}); ctx.stroke();}); bodies.forEach((b,i)=>{const p=worldToScreen(b); const r=Math.max(5,5+2.1*Math.sqrt(b.m)); ctx.fillStyle=BODY_COLORS[i]; ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle='#FFFFFF'; ctx.stroke();});}
function animate(){stepWorld(); draw(); requestAnimationFrame(animate);}
function adjustZoomAt(factor, clientX, clientY){
  const rect=canvas.getBoundingClientRect();
  if(!rect.width || !rect.height){return;}
  const dpr=canvas.width/rect.width || 1;
  const sx=(clientX===undefined ? rect.left+rect.width/2 : clientX);
  const sy=(clientY===undefined ? rect.top+rect.height/2 : clientY);
  const px=(sx-rect.left)*dpr;
  const py=(sy-rect.top)*dpr;
  const before=screenToWorld(px,py);
  const oldZoom=state.view.zoom;
  state.view.zoom=clip(state.view.zoom*factor,0.4,5);
  const after=screenToWorld(px,py);
  state.view.panX += before.x-after.x;
  state.view.panY += before.y-after.y;
  draw();
}
function adjustZoom(factor){adjustZoomAt(factor);}
function eventPoint(e){const rect=canvas.getBoundingClientRect(); const dpr=canvas.width/rect.width || 1; return {x:(e.clientX-rect.left)*dpr,y:(e.clientY-rect.top)*dpr};}
function handlePointerDown(e){
  if(e.pointerType==='touch') return;
  e.preventDefault();
  canvas.setPointerCapture?.(e.pointerId);
  const p=eventPoint(e);
  state.drag.active=true;
  state.drag.x=p.x;
  state.drag.y=p.y;
  state.drag.startPanX=state.view.panX;
  state.drag.startPanY=state.view.panY;
}
function handlePointerMove(e){
  if(e.pointerType==='touch' || !state.drag.active) return;
  e.preventDefault();
  const p=eventPoint(e);
  const w0=screenToWorld(state.drag.x,state.drag.y);
  const w1=screenToWorld(p.x,p.y);
  state.view.panX=state.drag.startPanX-(w1.x-w0.x);
  state.view.panY=state.drag.startPanY-(w1.y-w0.y);
  draw();
}
function endPointer(){state.drag.active=false;}
function wheelZoom(e){
  e.preventDefault();
  const unit=e.deltaMode===1?16:e.deltaMode===2?window.innerHeight:1;
  const dy=e.deltaY*unit;
  const factor=Math.exp(-dy*0.0015);
  adjustZoomAt(factor,e.clientX,e.clientY);
}
function touchCanvasPoint(t){
  const rect=canvas.getBoundingClientRect(); const dpr=canvas.width/rect.width || 1;
  return {x:(t.clientX-rect.left)*dpr,y:(t.clientY-rect.top)*dpr};
}
function touchDistance(t0,t1){return Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY);}
function touchMidpoint(t0,t1){return {clientX:(t0.clientX+t1.clientX)/2,clientY:(t0.clientY+t1.clientY)/2};}
function handleTouchStart(e){
  if(e.touches.length===1){
    e.preventDefault();
    const p=touchCanvasPoint(e.touches[0]);
    state.touch={mode:'pan',x:p.x,y:p.y,startPanX:state.view.panX,startPanY:state.view.panY};
  } else if(e.touches.length>=2){
    e.preventDefault();
    const t0=e.touches[0], t1=e.touches[1];
    const mid=touchMidpoint(t0,t1);
    const rect=canvas.getBoundingClientRect(); const dpr=canvas.width/rect.width || 1;
    state.touch={mode:'pinch',dist:Math.max(1,touchDistance(t0,t1)),zoom:state.view.zoom,midClientX:mid.clientX,midClientY:mid.clientY,world:screenToWorld((mid.clientX-rect.left)*dpr,(mid.clientY-rect.top)*dpr)};
  }
}
function handleTouchMove(e){
  if(!state.touch) return;
  if(e.touches.length===1 && state.touch.mode==='pan'){
    e.preventDefault();
    const p=touchCanvasPoint(e.touches[0]);
    const w0=screenToWorld(state.touch.x,state.touch.y);
    const w1=screenToWorld(p.x,p.y);
    state.view.panX=state.touch.startPanX-(w1.x-w0.x);
    state.view.panY=state.touch.startPanY-(w1.y-w0.y);
    draw();
  } else if(e.touches.length>=2){
    e.preventDefault();
    const t0=e.touches[0], t1=e.touches[1];
    const dist=Math.max(1,touchDistance(t0,t1));
    const mid=touchMidpoint(t0,t1);
    if(state.touch.mode!=='pinch'){
      const rect=canvas.getBoundingClientRect(); const dpr=canvas.width/rect.width || 1;
      state.touch={mode:'pinch',dist,zoom:state.view.zoom,midClientX:mid.clientX,midClientY:mid.clientY,world:screenToWorld((mid.clientX-rect.left)*dpr,(mid.clientY-rect.top)*dpr)};
    }
    state.view.zoom=clip(state.touch.zoom*dist/state.touch.dist,0.4,5);
    const rect=canvas.getBoundingClientRect(); const dpr=canvas.width/rect.width || 1;
    const current=screenToWorld((mid.clientX-rect.left)*dpr,(mid.clientY-rect.top)*dpr);
    state.view.panX += state.touch.world.x-current.x;
    state.view.panY += state.touch.world.y-current.y;
    draw();
  }
}
function handleTouchEnd(e){
  if(e.touches.length===0){state.touch=null; state.drag.active=false; return;}
  if(e.touches.length===1){
    const p=touchCanvasPoint(e.touches[0]);
    state.touch={mode:'pan',x:p.x,y:p.y,startPanX:state.view.panX,startPanY:state.view.panY};
  }
}
canvas.addEventListener('pointerdown',handlePointerDown,{passive:false});
canvas.addEventListener('pointermove',handlePointerMove,{passive:false});
canvas.addEventListener('pointerup',endPointer,{passive:false});
canvas.addEventListener('pointercancel',endPointer,{passive:false});
canvas.addEventListener('wheel',wheelZoom,{passive:false});
canvas.addEventListener('touchstart',handleTouchStart,{passive:false});
canvas.addEventListener('touchmove',handleTouchMove,{passive:false});
canvas.addEventListener('touchend',handleTouchEnd,{passive:false});
canvas.addEventListener('touchcancel',handleTouchEnd,{passive:false});
function wireZoomButton(btn,factor){
  const fire=e=>{e.preventDefault(); e.stopPropagation(); adjustZoomAt(factor);};
  if(window.PointerEvent){btn.addEventListener('pointerdown',fire,{passive:false});}
  else {btn.addEventListener('touchstart',fire,{passive:false}); btn.addEventListener('click',fire,{passive:false});}
}
wireZoomButton(ui.zoomInBtn,1.15);
wireZoomButton(ui.zoomOutBtn,1/1.15);
ui.mainTabBtn.addEventListener('click',()=>setActiveTab('main')); ui.bodiesTabBtn.addEventListener('click',()=>setActiveTab('bodies'));
ui.exactModeBtn.addEventListener('click',()=>setMode('exact')); ui.simModeBtn.addEventListener('click',()=>setMode('simulated'));
function handlePresetSelection(){ if(ui.presetSelect.disabled) return; const preset = presetsById.get(ui.presetSelect.value); if(!preset) return; state.preset = preset; resetToPreset(preset); }
ui.presetSelect.addEventListener('change',handlePresetSelection);
ui.presetSelect.addEventListener('input',handlePresetSelection);
ui.playPauseBtn.addEventListener('click',()=>{state.running=!state.running; ui.playPauseBtn.textContent=state.running?'Pause':'Play';});
ui.resetBtn.addEventListener('click',()=>resetToPreset(state.preset));
bodyFields.forEach(group=>{Object.values(group).forEach(el=>{el.addEventListener('input',()=>{if(state.mode!=='simulated') return; applyManualFields();}); el.addEventListener('change',()=>{if(state.mode!=='simulated') return; applyManualFields();});});});
ui.dtInput.addEventListener('input',()=>{if(state.mode!=='simulated') return; applyManualFields();});
ui.dtInput.addEventListener('change',()=>{if(state.mode!=='simulated') return; applyManualFields();});
for(const p of PRESETS){const opt=document.createElement('option'); opt.value=p.id; opt.textContent=p.label; ui.presetSelect.appendChild(opt);} ui.presetSelect.value=PRESETS[0].id;
updateModeVisuals(); setActiveTab('main'); resetToPreset(PRESETS[0]); animate();
})();
</script>
